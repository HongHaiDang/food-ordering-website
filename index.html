<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Food Ordering Website</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            color: #ff5722;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 150px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            background: #ff5722;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #e64a19;
        }

        #cart {
            margin-top: 30px;
            background: white;
            padding: 20px;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <h1>🍔 Website Đặt Món Ăn</h1>

    <div class="menu">
        <div class="item">
            <h3>Pizza</h3>
            <p>100k</p>
            <button onclick="addToCart('Pizza')">Thêm</button>
        </div>

        <div class="item">
            <h3>Hamburger</h3>
            <p>50k</p>
            <button onclick="addToCart('Hamburger')">Thêm</button>
        </div>

        <div class="item">
            <h3>Trà sữa</h3>
            <p>30k</p>
            <button onclick="addToCart('Trà sữa')">Thêm</button>
        </div>
    </div>

    <div id="cart">
        <h2>🛒 Giỏ hàng</h2>
        <ul id="cart-list"></ul>
    </div>

    <script>
        let cart = [];

        function addToCart(item) {
            cart.push(item);
            renderCart();
        }

        function renderCart() {
            let list = document.getElementById("cart-list");
            list.innerHTML = "";

            cart.forEach(function(item) {
                let li = document.createElement("li");
                li.textContent = item;
                list.appendChild(li);
            });
        }
    </script>

</body>
</html>
