<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Ordering Pro</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #ff5722;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 20px;
}

.menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.item {
    background: white;
    padding: 15px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.item:hover {
    transform: scale(1.05);
}

.item img {
    width: 100%;
    border-radius: 10px;
}

button {
    background: #ff5722;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 10px;
    cursor: pointer;
    border-radius: 6px;
}

#cart {
    position: fixed;
    right: 20px;
    top: 80px;
    width: 300px;
    background: white;
    padding: 15px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
}

#cart ul {
    list-style: none;
    padding: 0;
}

#cart li {
    display: flex;
    justify-content: space-between;
    margin: 5px 0;
}

.total {
    font-weight: bold;
    margin-top: 10px;
}

.badge {
    background: red;
    color: white;
    border-radius: 50%;
    padding: 5px 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<header>
    <h1>🍔 Food Ordering Pro <span id="count" class="badge">0</span></h1>
</header>

<div class="container">

<div class="menu">

<div class="item">
<img src="https://via.placeholder.com/200">
<h3>Pizza</h3>
<p>100k</p>
<button onclick="addToCart('Pizza')">Thêm</button>
</div>

<div class="item">
<img src="https://via.placeholder.com/200">
<h3>Hamburger</h3>
<p>50k</p>
<button onclick="addToCart('Hamburger')">Thêm</button>
</div>

<div class="item">
<img src="https://via.placeholder.com/200">
<h3>Trà sữa</h3>
<p>30k</p>
<button onclick="addToCart('Trà sữa')">Thêm</button>
</div>

</div>

</div>

<div id="cart">
<h2>🛒 Giỏ hàng</h2>
<ul id="cart-list"></ul>
<p class="total" id="total">Tổng: 0k</p>
<button onclick="clearCart()">Xóa hết</button>
</div>

<script>
let cart = [];

let prices = {
    "Pizza": 100,
    "Hamburger": 50,
    "Trà sữa": 30
};

function addToCart(item) {
    cart.push(item);
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function clearCart() {
    cart = [];
    renderCart();
}

function renderCart() {
    let list = document.getElementById("cart-list");
    let total = 0;

    list.innerHTML = "";

    cart.forEach((item, index) => {
        total += prices[item];

        let li = document.createElement("li");
        li.innerHTML = `
            ${item} (${prices[item]}k)
            <button onclick="removeItem(${index})">❌</button>
        `;
        list.appendChild(li);
    });

    document.getElementById("total").innerText = "Tổng: " + total + "k";
    document.getElementById("count").innerText = cart.length;
}
</script>

</body>
</html>
